# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
        medias_directory: '%kernel.project_dir%/public/documents/medias'
        uploads-directory : 'uploads/'
        recaptcha_secret_key: '%env(default:empty_string:RECAPTCHA_SECRET_KEY)%'
        recaptcha_site_key: '%env(default:empty_string:RECAPTCHA_SITE_KEY)%'
        empty_string: ''

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\MediaProcessorService:
        arguments:
            $mediaDirectory: '%medias_directory%'

    App\Twig\ResponsiveImageExtension:
        arguments:
            $mediaDirectory: '%medias_directory%'

    App\Service\BlockRenderer:
        arguments:
            $mediaDirectory: '%medias_directory%'

    App\Service\FaviconGeneratorService:
        arguments:
            $mediaDirectory: '%medias_directory%'
            $publicDirectory: '%kernel.project_dir%/public'


    App\Service\ThemeService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\StripeService:
        arguments:
            $stripeSecretKey: '%env(STRIPE_SECRET_KEY)%'
            $stripeWebhookSecret: '%env(STRIPE_WEBHOOK_SECRET)%'

    App\Command\RecaptchaSetupCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\RecaptchaValidator:
        arguments:
            $recaptchaSecretKey: '%recaptcha_secret_key%'
            $recaptchaSiteKey: '%recaptcha_site_key%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
