# Dev overrides — loaded automatically with docker-compose.yml
services:
  php:
    build:
      args:
        XDEBUG: "true"
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      PHP_IDE_CONFIG: "serverName=blog_web"
      XDEBUG_MODE: "debug"
      XDEBUG_CONFIG: "client_host=host.docker.internal"

  node:
    image: node:20-alpine
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html:cached
    profiles:
      - assets
